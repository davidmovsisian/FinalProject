models:
  - type: main
    engine: openai
    model: ${GUARDRAILS_LLM_MODEL:-gpt-4o-mini}

instructions:
  - type: general
    content: |
      You are a real estate content safety auditor. Your role is to validate that
      submitted texts are genuine property listings written in English or Hebrew,
      and that AI-generated property reports do not contain false legal claims,
      fabricated prices, or invented certifications. Always respond with structured
      PASS or FAIL verdicts.

rails:
  input:
    flows:
      - check property listing
  output:
    flows:
      - check output safety
