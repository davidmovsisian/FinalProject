services:
  rag_model_downloader:
    image: python:3.11-slim
    container_name: rag_model_downloader
    working_dir: /tmp
    volumes:
      - rag_models:/models
    command:
      - sh
      - -c
      - |
        apt-get update -qq
        apt-get install -y -qq wget
        wget --no-continue -c -P /models \
          "https://huggingface.co/dphn/Dolphin3.0-Llama3.1-8B-GGUF/resolve/main/Dolphin3.0-Llama3.1-8B-Q4_K_M.gguf"
        pip install -q huggingface_hub
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='sentence-transformers/all-MiniLM-L6-v2', local_dir='/models/embeddings/all-MiniLM-L6-v2')"
    restart: "no"

  rag_service:
    build:
      context: ./services/rag_service
    container_name: rag_service
    depends_on:
      rag_model_downloader:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      RAG_LLM_MODEL_PATH: /models/Dolphin3.0-Llama3.1-8B-Q4_K_M.gguf
      RAG_EMBEDDING_MODEL_PATH: /models/embeddings/all-MiniLM-L6-v2
      CHROMA_PATH: /rag_service/chroma_db
    volumes:
      - rag_chroma:/rag_service/chroma_db
      - rag_models:/models
    restart: unless-stopped

  image_analyzer_service:
    build:
      context: ./services/image_analyzer
    container_name: image_analyzer_service
    env_file:
      - ./services/image_analyzer/.env
    ports:
      - "8001:8000"
    restart: unless-stopped
    
volumes:
  rag_chroma:
  rag_models:
